<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin/admin.css">
    <title>Tecnicax Admin - Productos</title>
</head>
<body class="d-flex flex-column min-vh-100 admin-body">

    <header class="admin-topbar">
        <div class="container d-flex align-items-center justify-content-between py-3">
            <a href="/admin/index.html" class="text-light text-decoration-none small">
                <i class="bi bi-arrow-left me-1"></i>Volver al dashboard
            </a>
            <button id="logout-btn" class="btn btn-sm btn-outline-light">
                <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
            </button>
        </div>
    </header>

    <main class="flex-grow-1">
        <div class="container py-5">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h1 class="h3 fw-bold mb-0">Productos</h1>
                <button id="btn-nuevo-producto" class="btn btn-brand">
                    <i class="bi bi-plus-lg me-1"></i>Nuevo producto
                </button>
            </div>

            <div id="global-message" class="form-message d-none mb-3"></div>

            <div class="table-responsive">
                <table class="table table-dark table-hover admin-table align-middle">
                    <thead>
                        <tr>
                            <th scope="col">Imagen</th>
                            <th scope="col">Nombre</th>
                            <th scope="col">Categoría</th>
                            <th scope="col">Precio</th>
                            <th scope="col">Orden</th>
                            <th scope="col">Estado</th>
                            <th scope="col" class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="productos-tbody">
                        <tr>
                            <td colspan="7" class="text-center text-muted-custom py-4">Cargando productos...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="admin-footer text-center py-3">
        <small class="text-muted-custom">Panel de administración</small>
    </footer>

    <!-- Modal: alta / edición de producto -->
    <div class="modal fade" id="producto-modal" tabindex="-1" aria-hidden="true" data-bs-theme="dark">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-card-custom border-custom">
                <div class="modal-header border-custom">
                    <h2 class="modal-title h5 mb-0" id="producto-modal-title">Nuevo producto</h2>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="producto-form" novalidate>
                        <input type="hidden" id="campo-id">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label" for="campo-nombre">Nombre *</label>
                                <input type="text" id="campo-nombre" class="form-control form-dark" required maxlength="150">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label" for="campo-categoria">Categoría</label>
                                <select id="campo-categoria" class="form-select form-dark">
                                    <option value="impresora">Impresora</option>
                                    <option value="scanner">Scanner</option>
                                    <option value="multifuncion">Multifunción</option>
                                    <option value="leasing">Leasing</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label" for="campo-descripcion">Descripción</label>
                                <textarea id="campo-descripcion" class="form-control form-dark" rows="3" maxlength="1000"></textarea>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label" for="campo-precio">Precio</label>
                                <input type="number" id="campo-precio" class="form-control form-dark" min="0" step="0.01" placeholder="Opcional">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label" for="campo-orden">Orden</label>
                                <input type="number" id="campo-orden" class="form-control form-dark" min="0" step="1" value="0">
                            </div>

                            <div class="col-md-4 d-flex align-items-center">
                                <div class="form-check form-switch mt-4">
                                    <input class="form-check-input" type="checkbox" id="campo-activo" checked>
                                    <label class="form-check-label" for="campo-activo">Activo</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label" for="campo-imagen">Imagen (JPG, PNG o WEBP — máx. 2MB)</label>
                                <input type="file" id="campo-imagen" class="form-control form-dark" accept="image/jpeg,image/png,image/webp">
                                <img id="imagen-preview" src="" alt="Vista previa" class="d-none rounded mt-2">
                            </div>
                        </div>

                        <div id="form-message" class="form-message d-none mt-3"></div>
                    </form>
                </div>
                <div class="modal-footer border-custom">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" form="producto-form" id="btn-guardar-producto" class="btn btn-brand">
                        <span id="btn-guardar-text">Guardar producto</span>
                        <span id="btn-guardar-spinner" class="spinner-border spinner-border-sm d-none ms-2" role="status" aria-hidden="true"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jyor353NHNqZpKFZeXCVYPVxHQb+"
      crossorigin="anonymous"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"
      integrity="sha384-YieCqqg9gQufX7+5HcFvCEg/n3KUEdl8/Jb+A6J0npf1mB740VayvwKjTrtCeUoy"
      crossorigin="anonymous"></script>
    <script src="/admin/config.js"></script>
    <script src="/admin/auth.js"></script>
    <script src="/admin/productos.js"></script>
    <script>
        checkAuth();
        document.getElementById('logout-btn').addEventListener('click', logout);
    </script>
</body>
</html>
