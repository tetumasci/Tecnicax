<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin/admin.css">
    <title>Tecnicax Admin - Iniciar sesión</title>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <main class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock fs-1 text-brand"></i>
            <h1 class="h4 fw-bold text-uppercase tracking-wider mt-2 mb-0">Tecnicax Admin</h1>
            <p class="text-muted-custom small">Panel de administración</p>
        </div>

        <form id="login-form" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control form-dark" id="email" required autocomplete="username">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control form-dark" id="password" required autocomplete="current-password">
            </div>

            <div id="login-message" class="form-message d-none mb-3"></div>

            <button type="submit" id="login-btn" class="btn btn-brand w-100">
                <span id="login-btn-text">Ingresar</span>
                <span id="login-btn-spinner" class="spinner-border spinner-border-sm d-none ms-2" role="status" aria-hidden="true"></span>
            </button>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/admin/config.js"></script>
    <script src="/admin/auth.js"></script>
    <script>
        (async function redirectIfLoggedIn() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = '/admin/index.html';
            }
        })();

        const form = document.getElementById('login-form');
        const messageEl = document.getElementById('login-message');
        const btn = document.getElementById('login-btn');
        const btnText = document.getElementById('login-btn-text');
        const btnSpinner = document.getElementById('login-btn-spinner');

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `form-message mb-3 form-message-${type}`;
        }

        function setLoading(isLoading) {
            btn.disabled = isLoading;
            btnText.textContent = isLoading ? 'Ingresando...' : 'Ingresar';
            btnSpinner.classList.toggle('d-none', !isLoading);
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            messageEl.classList.add('d-none');
            setLoading(true);

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

            setLoading(false);

            if (error) {
                showMessage('Email o contraseña incorrectos.', 'error');
                return;
            }

            window.location.href = '/admin/index.html';
        });
    </script>
</body>
</html>
