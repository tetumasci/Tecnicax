<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin/admin.css">
    <title>Tecnicax Admin - Contenido del sitio</title>
</head>
<body class="d-flex flex-column min-vh-100 admin-body">

    <header class="admin-topbar">
        <div class="container d-flex align-items-center justify-content-between py-3">
            <a href="/admin/index.html" class="text-light text-decoration-none small">
                <i class="bi bi-arrow-left me-1"></i>Volver al dashboard
            </a>
            <button id="logout-btn" class="btn btn-sm btn-outline-light">
                <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
            </button>
        </div>
    </header>

    <main class="flex-grow-1">
        <div class="container py-5" style="max-width: 820px;">
            <h1 class="h3 fw-bold mb-1">Contenido del sitio</h1>
            <p class="text-muted-custom mb-4">Editá los textos que aparecen en las páginas públicas, agrupados por sección.</p>

            <div id="global-message" class="form-message d-none mb-3"></div>

            <div id="secciones-container" class="accordion" data-bs-theme="dark">
                <p class="text-muted-custom">Cargando contenido...</p>
            </div>
        </div>
    </main>

    <footer class="admin-footer text-center py-3">
        <small class="text-muted-custom">Panel de administración</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jyor353NHNqZpKFZeXCVYPVxHQb+"
      crossorigin="anonymous"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"
      integrity="sha384-YieCqqg9gQufX7+5HcFvCEg/n3KUEdl8/Jb+A6J0npf1mB740VayvwKjTrtCeUoy"
      crossorigin="anonymous"></script>
    <script src="/admin/config.js"></script>
    <script src="/admin/auth.js"></script>
    <script src="/admin/contenido.js"></script>
    <script>
        checkAuth();
        document.getElementById('logout-btn').addEventListener('click', logout);
    </script>
</body>
</html>
