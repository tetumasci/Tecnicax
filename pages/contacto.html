<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <title>Tecnicax - Contacto</title>
</head>
<body class="d-flex flex-column min-vh-100">

    <div id="nav-placeholder"></div>

    <main class="flex-grow-1 py-5 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">
                    <div class="card bg-card-custom border-custom shadow rounded-4 p-4 p-sm-5">
                        <h1 class="h2 text-center fw-bold text-white mb-2">Dejanos tu consulta</h1>
                        <p class="text-muted-custom text-center mb-4">Completá los datos y te asignaremos un técnico especialista.</p>
                        
                        <form id="contactForm" class="needs-validation" novalidate>
                            <div class="row g-3 mb-3">
                                <div class="col-12 col-sm-6">
                                    <label for="nombre" class="form-label small fw-semibold text-secondary">Nombre Completo</label>
                                    <input type="text" id="nombre" name="nombre" class="form-control form-control-lg form-dark rounded-3" placeholder="Ingresa tu nombre" required>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label for="email" class="form-label small fw-semibold text-secondary">Correo Electrónico</label>
                                    <input type="email" id="email" name="email" class="form-control form-control-lg form-dark rounded-3" placeholder="Ingresa tu correo" required>
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-12 col-sm-6">
                                    <label for="telefono" class="form-label small fw-semibold text-secondary">Teléfono</label>
                                    <input type="tel" id="telefono" name="telefono" class="form-control form-control-lg form-dark rounded-3" placeholder="Número de contacto" required>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label for="producto" class="form-label small fw-semibold text-secondary">Tipo de Servicio</label>
                                    <select id="producto" name="producto" class="form-select form-control-lg form-dark rounded-3" required>
                                        <option value="" disabled selected hidden>Seleccioná una opción</option>
                                        <option value="impresora">Impresora</option>
                                        <option value="scanner">Scanner</option>
                                        <option value="servicio-tecnico">Servicio Técnico</option>
                                        <option value="otro">Otro</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="descripcion" class="form-label small fw-semibold text-secondary">Descripción del Problema</label>
                                <textarea id="descripcion" name="descripcion" class="form-control form-dark rounded-3" rows="4" placeholder="Detallanos el síntoma o requerimiento del equipo..." required></textarea>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-brand btn-lg rounded-3 py-3 text-uppercase tracking-wider fs-6">
                                    Enviar Solicitud <i class="bi bi-send-fill ms-2"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <!-- Script de EmailJS para hacerlo 100% Funcional sin backend -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        (function() {
            // Inicializá EmailJS con tu Public Key de la cuenta de EmailJS
            emailjs.init("TU_PUBLIC_KEY_DE_EMAILJS");
        })();

        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            // Validación nativa de Bootstrap
            if (!this.checkValidity()) {
                event.stopPropagation();
                this.classList.add('was-validated');
                return;
            }

            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = 'Enviando... <span class="spinner-border spinner-border-sm ms-2"></span>';
            btn.disabled = true;

            // Enviamos el formulario directamente usando EmailJS
            emailjs.sendForm('TU_SERVICE_ID', 'TU_TEMPLATE_ID', this)
                .then(() => {
                    alert('¡Solicitud enviada con éxito! Nos comunicaremos pronto.');
                    this.reset();
                    this.classList.remove('was-validated');
                    btn.innerHTML = 'Enviar Solicitud <i class="bi bi-send-fill ms-2"></i>';
                    btn.disabled = false;
                }, (error) => {
                    alert('Hubo un error al enviar el mensaje, por favor reintentá.');
                    console.log('FAILED...', error);
                    btn.innerHTML = 'Enviar Solicitud <i class="bi bi-send-fill ms-2"></i>';
                    btn.disabled = false;
                });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <script src="../main.js"></script>
</body>
</html>
